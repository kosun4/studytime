<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Apple Style StudyTimer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blur"></div>

    <main id="app">
        <section id="page-timer" class="page active">
            <div class="glass-circle">
                <div id="timerDisplay">00:00:00</div>
            </div>
            <div class="controls">
                <button id="startButton" class="glass-btn primary">開始</button>
                <button id="stopButton" class="glass-btn danger">終了</button>
            </div>
            <button id="resetButton" class="text-btn">保存せずにリセット</button>
        </section>

        <section id="page-stats" class="page">
            <h2 class="title">学習統計</h2>
            <div class="stat-card glass">
                <span>今日の合計</span>
                <p id="statToday">0h 0m</p>
            </div>
            <div class="stat-card glass">
                <span>総合計</span>
                <p id="statTotal">0h 0m</p>
            </div>
        </section>

        <section id="page-log" class="page">
            <h2 class="title">学習ログ</h2>
            <div id="logList" class="log-container"></div>
        </section>
    </main>

    <nav class="apple-nav">
        <button onclick="showPage('page-timer')" class="nav-item">計測</button>
        <button onclick="showPage('page-stats')" class="nav-item">合計</button>
        <button onclick="showPage('page-log')" class="nav-item">ログ</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
