<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>StudyApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="page-timer" class="page active">
        <div class="timer-circle">
            <div id="timerDisplay">00:00:00</div>
        </div>
        <div class="controls">
            <button id="startButton">開始</button>
            <button id="stopButton">終了</button>
            <button id="resetButton">リセット</button>
        </div>
    </section>

    <section id="page-stats" class="page">
        <h2>学習統計</h2>
        <div class="stat-box"><span>今日の合計</span><p id="statToday">0h 0m</p></div>
        <div class="stat-box"><span>総合計</span><p id="statTotal">0h 0m</p></div>
    </section>

    <section id="page-log" class="page">
        <h2>学習ログ</h2>
        <div id="logList"></div>
    </section>

    <nav class="bottom-nav">
        <button onclick="showPage('page-timer')">計測</button>
        <button onclick="showPage('page-stats')">合計</button>
        <button onclick="showPage('page-log')">ログ</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
