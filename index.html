<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Study Glass Light</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <main id="app">
        <section id="page-timer" class="page active">
            <div class="timer-orb">
                <div id="timerDisplay">00:00:00</div>
            </div>
            <div class="controls">
                <button onclick="startTimer()" class="btn btn-start">開始</button>
                <button onclick="resetTimer()" class="btn btn-reset">リセット</button>
                <button onclick="stopTimer()" class="btn btn-stop">終了</button>
            </div>
        </section>

        <section id="page-stats" class="page">
            <div class="page-header">統計レポート</div>
            <div class="stat-list">
                <div class="glass-card">
                    <span>Today</span>
                    <p id="statToday">00:00:00</p>
                </div>
                <div class="glass-card">
                    <span>This Month</span>
                    <p id="statMonth">00:00:00</p>
                </div>
                <div class="glass-card">
                    <span>Total Study Time</span>
                    <p id="statTotal">00:00:00</p>
                </div>
            </div>
        </section>

        <section id="page-log" class="page">
            <div class="page-header">学習履歴</div>
            <div id="logList">
                </div>
        </section>
    </main>

    <nav class="dock">
        <button onclick="showPage('page-timer')" class="dock-item active" id="nav-timer">計測</button>
        <button onclick="showPage('page-stats')" class="dock-item" id="nav-stats">統計</button>
        <button onclick="showPage('page-log')" class="dock-item" id="nav-log">ログ</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
