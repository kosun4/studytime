<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Study Glass Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob color-1"></div>
        <div class="blob color-2"></div>
    </div>

    <main id="app">
        <section id="page-timer" class="page active">
            <div class="glass-timer">
                <div id="timerDisplay">00:00:00</div>
            </div>
            <div class="controls">
                <button onclick="startTimer()" class="btn btn-start">開始</button>
                <button onclick="resetTimer()" class="btn btn-reset">リセット</button>
                <button onclick="stopTimer()" class="btn btn-stop">終了</button>
            </div>
        </section>

        <section id="page-stats" class="page">
            <div class="page-title">学習統計</div>
            <div class="stat-container">
                <div class="stat-card"><span>今日</span><p id="statToday">00:00:00</p></div>
                <div class="stat-card"><span>今月</span><p id="statMonth">00:00:00</p></div>
                <div class="stat-card"><span>合計</span><p id="statTotal">00:00:00</p></div>
            </div>
        </section>

        <section id="page-log" class="page">
            <div class="page-title">学習ログ</div>
            <div id="logList"></div>
        </section>
    </main>

    <nav class="tab-bar">
        <button onclick="showPage('page-timer')" class="tab-item active" id="nav-timer">計測</button>
        <button onclick="showPage('page-stats')" class="tab-item" id="nav-stats">統計</button>
        <button onclick="showPage('page-log')" class="tab-item" id="nav-log">ログ</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
