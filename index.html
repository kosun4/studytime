<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Study App Glass Final</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(255, 255, 255, 0.5);
            --blue: #0071e3;
            --red: #ff3b30;
            --gray: #86868b;
        }
        body { margin: 0; padding: 0; background: #f5f5f7; font-family: -apple-system, sans-serif; color: #1d1d1f; height: 100vh; overflow: hidden; }
        .bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(0,113,227,0.1) 0%, #ffffff 100%); z-index: -1; }
        .page { display: none; padding: 40px 20px; text-align: center; height: 82vh; overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-timer { width: 280px; height: 280px; margin: 40px auto; background: var(--glass); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 35px rgba(0,0,0,0.05); font-size: 56px; font-weight: 200; font-variant-numeric: tabular-nums; }
        .glass-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; }
        .glass-btn { width: 85px; height: 85px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border-style: none; }
        .glass-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.9); }
        .glass-btn.primary { color: var(--blue); } .glass-btn.danger { color: var(--red); } .glass-btn.secondary { color: var(--gray); }
        .stat-card { background: white; padding: 22px; border-radius: 24px; margin-bottom: 15px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #eee; }
        .stat-card span { font-size: 13px; color: var(--gray); font-weight: 500; }
        .stat-card p { font-size: 32px; font-weight: 700; margin: 5px 0; color: var(--blue); font-variant-numeric: tabular-nums; }
        .log-card { background: white; border-radius: 18px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; text-align: left; }
        .del-btn { color: var(--red); background: rgba(255,59,48,0.1); border: none; padding: 10px 15px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .apple-nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; border-top: 1px solid #d2d2d7; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { border: none; background: none; font-size: 12px; color: var(--gray); font-weight: 600; flex: 1; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <main id="app">
        <section id="page-timer" class="page active">
            <div class="glass-timer"><div id="timerDisplay">00:00:00</div></div>
            <div class="glass-controls">
                <button onclick="startTimer()" class="glass-btn primary">開始</button>
                <button onclick="resetTimer()" class="glass-btn secondary">リセット</button>
                <button onclick="stopTimer()" class="glass-btn danger">終了</button>
            </div>
        </section>
        <section id="page-stats" class="page">
            <h2 style="margin-bottom:20px;">学習統計</h2>
            <div class="stat-card"><span>今日の合計</span><p id="statToday">00:00:00</p></div>
            <div class="stat-card"><span>今月の合計</span><p id="statMonth">00:00:00</p></div>
            <div class="stat-card"><span>総合計</span><p id="statTotal">00:00:00</p></div>
        </section>
        <section id="page-log" class="page">
            <h2 style="margin-bottom:20px;">学習ログ</h2>
            <div id="logList"></div>
        </section>
    </main>
    <nav class="apple-nav">
        <button onclick="showPage('page-timer')" class="nav-item">計測</button>
        <button onclick="showPage('page-stats')" class="nav-item">統計</button>
        <button onclick="showPage('page-log')" class="nav-item">ログ</button>
    </nav>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycby3pv5UxD6FwT3vv2g2HY_WRp8_QIYIp0ecVSC6U0fvHw0lDOJ8IPj_18P34DVCwdkc/exec"; // ★ここに自分のURLを貼る

        let startTime, timerInterval, elapsedTime = 0;
        const timerDisplay = document.getElementById('timerDisplay');

        async function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id !== 'page-timer') await fetchAndProcessData();
        }

        function formatTime(s) {
            const h = Math.floor(s / 3600).toString().padStart(2, '0');
            const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
            const sc = Math.floor(s % 60).toString().padStart(2, '0');
            return `${h}:${m}:${sc}`;
        }

        function startTimer() {
            if (timerInterval) return;
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(() => {
                elapsedTime = Date.now() - startTime;
                timerDisplay.textContent = formatTime(Math.floor(elapsedTime / 1000));
            }, 100);
        }

        async function stopTimer() {
            if (elapsedTime < 1000) return;
            const finalTime = timerDisplay.textContent;
            clearInterval(timerInterval);
            timerInterval = null;
            elapsedTime = 0;
            timerDisplay.textContent = "00:00:00";
            try {
                await fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "add", duration: finalTime }) });
                alert("保存しました");
            } catch (e) { alert("エラー"); }
        }

        function resetTimer() {
            if(confirm("リセットしますか？")) {
                clearInterval(timerInterval);
                timerInterval = null;
                elapsedTime = 0;
                timerDisplay.textContent = "00:00:00";
            }
        }

        async function fetchAndProcessData() {
            const logList = document.getElementById('logList');
            if(logList) logList.innerHTML = "読み込み中...";
            try {
                const response = await fetch(URL);
                const rawLogs = await response.json();
                let total = 0, today = 0, month = 0;
                const now = new Date();
                const tStr = now.toLocaleDateString();
                const mStr = now.getFullYear() + "/" + (now.getMonth() + 1);

                if(logList) logList.innerHTML = "";
                rawLogs.reverse().forEach(log => {
                    let sec = 0;
                    // --- 超重要：1899年バグを完全に封じ込める計算式 ---
                    if (typeof log.duration === 'string' && log.duration.includes(':')) {
                        const p = log.duration.split(':');
                        sec = parseInt(p[0]) * 3600 + parseInt(p[1]) * 60 + parseInt(p[2]);
                    } else {
                        // 日付オブジェクトとして届いた場合、時・分・秒だけを取り出す
                        const d = new Date(log.duration);
                        if (!isNaN(d.getTime())) {
                            sec = d.getUTCHours() * 3600 + d.getUTCMinutes() * 60 + d.getUTCSeconds();
                        }
                    }

                    total += sec;
                    const lDate = new Date(log.timestamp);
                    if (lDate.toLocaleDateString() === tStr) today += sec;
                    if (lDate.getFullYear() + "/" + (lDate.getMonth() + 1) === mStr) month += sec;

                    const div = document.createElement('div');
                    div.className = 'log-card';
                    div.innerHTML = `<div><small>${lDate.toLocaleString()}</small><div><b>${formatTime(sec)}</b></div></div>
                                     <button onclick="deleteLog('${log.id}')" class="del-btn">削除</button>`;
                    if(logList) logList.appendChild(div);
                });
                document.getElementById('statToday').textContent = formatTime(today);
                document.getElementById('statMonth').textContent = formatTime(month);
                document.getElementById('statTotal').textContent = formatTime(total);
            } catch (e) { if(logList) logList.innerHTML = "データなし"; }
        }

        async function deleteLog(id) {
            if(!confirm("削除しますか？")) return;
            await fetch(URL, { method: "POST", body: JSON.stringify({ action: "delete", id: id }) });
            await fetchAndProcessData();
        }
    </script>
</body>
</html>
